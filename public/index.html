<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pirate RTS .io</title>
    <style>
        body { margin: 0; overflow: hidden; background: #004a6b; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; }
        canvas { display: block; background: #005a82; }
        
        /* Effetto Glassmorphism */
        .glass-panel { background: rgba(10, 15, 25, 0.75); backdrop-filter: blur(8px); border: 1px solid rgba(243, 156, 18, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); border-radius: 12px; color: white; }

        #lobbyUI { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 40px; text-align: center; z-index: 10; width: 320px; }
        #lobbyUI input { padding: 12px; width: 90%; font-size: 16px; margin-bottom: 15px; border-radius: 8px; border: none; text-align: center; background: rgba(255,255,255,0.9); }
        #lobbyUI button { padding: 15px 30px; background: #f39c12; border: none; font-weight: bold; font-size: 18px; border-radius: 8px; cursor: pointer; color: #111; transition: 0.2s; width: 100%; margin-bottom: 10px; }
        #lobbyUI button:hover { background: #e67e22; transform: scale(1.03); }

        #gameUI { display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: 110px; border-top: 2px solid #f39c12; border-radius: 0; display: flex; justify-content: center; align-items: center; gap: 40px; z-index: 5; }
        #statsBox { font-size: 24px; font-weight: bold; color: #f1c40f; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.5); padding: 15px 25px; border-radius: 10px; }
        
        #shopContainer { display: flex; gap: 10px; }
        .upg-col { display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); width: 130px; }
        .upg-title { color: white; font-size: 12px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .buy-btn { background: #27ae60; color: white; border: none; padding: 8px 10px; font-size: 13px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.1s; width: 100%; }
        .buy-btn:hover:not(:disabled) { background: #2ecc71; transform: translateY(-2px); }
        .buy-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        
        #minimapBox { display: none; position: absolute; top: 20px; right: 20px; width: 180px; height: 180px; border: 3px solid #f39c12; border-radius: 50%; overflow: hidden; z-index: 5; }
        #leaderboardBox { display: none; position: absolute; top: 220px; right: 20px; width: 210px; padding: 12px; z-index: 5; font-size: 14px; }
        #leaderboardBox h3 { margin: 0 0 10px 0; font-size: 15px; text-align: center; color: #f39c12; text-transform: uppercase; border-bottom: 1px solid rgba(243,156,18,0.3); padding-bottom: 5px; }
        .lb-entry { display: flex; justify-content: space-between; margin-bottom: 6px; font-weight: 500; }
        
        #compassBox { display: none; position: absolute; top: 20px; left: 20px; width: 65px; height: 65px; border: 3px solid #f39c12; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5; }
        #compassNeedle { width: 4px; height: 45px; background: linear-gradient(to bottom, #e74c3c 50%, #ecf0f1 50%); border-radius: 2px; transform-origin: center center; }

        /* Scelta Classe */
        #classSelection { display: none; position: absolute; top: 30%; left: 50%; transform: translateX(-50%); text-align: center; padding: 30px; z-index: 20; border: 2px solid #3498db; }
        #classSelection h2 { color: #3498db; margin-top: 0; }
        .class-btn { background: #2980b9; padding: 15px; border: none; color: white; margin: 10px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; width: 150px; }
        .class-btn:hover { background: #3498db; }

        /* Chat System */
        #chatBox { display: none; position: absolute; bottom: 130px; left: 20px; width: 300px; height: 200px; display: flex; flex-direction: column; z-index: 10; pointer-events: none; }
        #chatMessages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 10px; }
        .chat-msg { font-size: 13px; margin-bottom: 4px; text-shadow: 1px 1px 2px black; }
        .msg-sys { color: #f1c40f; font-weight: bold; }
        .msg-crew { color: #3498db; }
        .msg-global { color: #ecf0f1; }
        #chatInput { display: none; pointer-events: auto; width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #f39c12; background: rgba(0,0,0,0.8); color: white; }

        /* Controlli Mobile */
        #mobileControls { display: none; position: absolute; bottom: 130px; width: 100%; height: 150px; z-index: 6; pointer-events: none; }
        #joystickZone { position: absolute; left: 30px; bottom: 10px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; pointer-events: auto; }
        #joystickKnob { position: absolute; top: 40px; left: 40px; width: 40px; height: 40px; background: rgba(243,156,18,0.8); border-radius: 50%; }
        #actionBtns { position: absolute; right: 30px; bottom: 10px; display: flex; gap: 15px; pointer-events: auto; }
        .mob-btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(231, 76, 60, 0.8); border: 2px solid #c0392b; color: white; font-size: 24px; }
    </style>
</head>
<body>

    <div id="lobbyUI" class="glass-panel">
        <h1 style="color:#f39c12; margin-top:0; letter-spacing: 2px; font-size: 36px; text-shadow: 0 3px 6px black;">CORSARI .IO</h1>
        <input type="text" id="usernameInput" placeholder="Scegli il tuo nome..." maxlength="14"><br>
        <input type="text" id="crewInput" placeholder="Tag Ciurma (Es: RM, GOLD)..." maxlength="4"><br>
        <button id="startButton">SALPA LE ANCORE</button>
        <button id="loginBtn" style="background:#34495e; color:white; font-size:14px; margin-top:10px;">Accedi con Firebase</button>
        <p id="authStatus" style="font-size:12px; color:#aaa;"></p>
    </div>

    <div id="classSelection" class="glass-panel">
        <h2>Evoluzione Scafo Disponibile!</h2>
        <button class="class-btn" onclick="selectClass('galleon')">Galeone<br><small>Tanti HP, Lento</small></button>
        <button class="class-btn" onclick="selectClass('clipper')">Clipper<br><small>Veloce, Danni Frontali</small></button>
        <button class="class-btn" onclick="selectClass('caravel')">Caravella<br><small>Bilanciata, Visibilità</small></button>
    </div>

    <canvas id="gameCanvas" style="display:none;"></canvas>

    <div id="compassBox" class="glass-panel"><div id="compassNeedle"></div></div>
    <div id="minimapBox" class="glass-panel"><canvas id="minimapCanvas" width="180" height="180"></canvas></div>
    
    <div id="leaderboardBox" class="glass-panel">
        <h3>Classifica</h3>
        <div id="leaderboardContent"></div>
    </div>

    <div id="chatBox">
        <div id="chatMessages"></div>
        <input type="text" id="chatInput" placeholder="Scrivi un messaggio... (Usa /crew per la ciurma)">
    </div>

    <div id="mobileControls">
        <div id="joystickZone"><div id="joystickKnob"></div></div>
        <div id="actionBtns">
            <button id="mobBtnSkill" class="mob-btn" style="background: #3498db; border-color: #2980b9;">💨</button>
            <button id="mobBtnShoot" class="mob-btn">🔥</button>
        </div>
    </div>

    <div id="gameUI" class="glass-panel">
        <div id="statsBox">💰 <span id="goldAmount">0</span></div>
        <div id="shopContainer">
            <div class="upg-col"><span class="upg-title">❤️ Scafo</span><button id="btn_hp_size" class="buy-btn" onclick="buyUpg('hp_size')">LVL UP</button></div>
            <div class="upg-col"><span class="upg-title">⚔️ Danni</span><button id="btn_damage" class="buy-btn" onclick="buyUpg('damage')">LVL UP</button></div>
            <div class="upg-col"><span class="upg-title">🏴‍☠️ Cannoni</span><button id="btn_cannons" class="buy-btn" onclick="buyUpg('cannons')">LVL UP</button></div>
            <div class="upg-col"><span class="upg-title">⛵ Vele</span><button id="btn_speed" class="buy-btn" onclick="buyUpg('speed')">LVL UP</button></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "INSERISCI_API_KEY",
            authDomain: "INSERISCI_DOMAIN",
            projectId: "INSERISCI_PROJECT_ID"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            
            document.getElementById('loginBtn').addEventListener('click', () => {
                signInAnonymously(auth).then(() => {
                    document.getElementById('authStatus').innerText = "Autenticato con successo!";
                    document.getElementById('loginBtn').style.display = 'none';
                }).catch((error) => console.error(error));
            });

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('authStatus').innerText = "Account Firebase Collogato.";
                    document.getElementById('loginBtn').style.display = 'none';
                }
            });
        } catch (e) {
            console.log("Firebase config in sospeso.");
        }
    </script>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const mCanvas = document.getElementById('minimapCanvas');
        const mCtx = mCanvas.getContext('2d');
        
        // --- Texture Assets ---
        const waterTexture = new Image(); waterTexture.src = 'https://i.postimg.cc/Vr3Y8xXw/water.png';
        const islandTexture = new Image(); islandTexture.src = 'https://i.postimg.cc/hzHSBkVW/isle.png';
        const krakenSprite = new Image(); krakenSprite.src = 'https://i.postimg.cc/jdLL2smF/58744aa8-6a18-422e-a6c3-a6d5cb8c1eb8.png';
        // ----------------------
        
        const MAP_SIZE = 8000;
        let state = { players: {}, npcs: {}, bullets: [], resources: [], isNight: false, specialTreasure: null, kraken: null, leaderboard: [] };
        let localIslands = [];
        
        let particles = [];
        let screenShake   = 0;

        // ── Cache rendering — evitano allocazioni nel hot path ─────────
        let _waterPattern = null;   // pattern acqua creato una sola volta
        waterTexture.onload = () => { _waterPattern = null; };   // reset se ricarica

        // Fog gradient cached per giorno e notte (ricreato solo al resize/fov change)
        const _fogCache = { day: null, night: null, fov: -1, w: -1, h: -1 };
        function getFogGrad(fov) {
            const w = canvas.width, h = canvas.height;
            if (_fogCache.fov !== fov || _fogCache.w !== w || _fogCache.h !== h) {
                _fogCache.day = null; _fogCache.night = null;
                _fogCache.fov = fov; _fogCache.w = w; _fogCache.h = h;
            }
            if (state.isNight && !_fogCache.night) {
                const g = ctx.createRadialGradient(w/2, h/2, fov/2.5, w/2, h/2, fov);
                g.addColorStop(0, 'rgba(0,12,30,0.35)'); g.addColorStop(1, 'rgba(0,4,12,0.98)');
                _fogCache.night = g;
            } else if (!state.isNight && !_fogCache.day) {
                const g = ctx.createRadialGradient(w/2, h/2, fov/2.5, w/2, h/2, fov);
                g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,45,65,0.88)');
                _fogCache.day = g;
            }
            return state.isNight ? _fogCache.night : _fogCache.day;
        }

        // isVisible: AABB test — risolto fuori dal frame, aggiornato ogni draw()
        let _visHalfW = 0, _visHalfH = 0, _visCx = 0, _visCy = 0;
        function isVisible(wx, wy) {
            return Math.abs(wx - _visCx) <= _visHalfW && Math.abs(wy - _visCy) <= _visHalfH;
        }

        // Minimap throttle: ridisegno a ~5 Hz (ogni 12 frame a 60fps)
        let _minimapFrame = 0;
        let isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        const shipSprite = new Image();
        shipSprite.src = 'https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/02f7fc23-e1ad-4d3c-bf35-1c3d96f43d92/d68usui-ef6c334e-11b7-4f75-88b9-ecd34c5d4bf0.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7InBhdGgiOiIvZi8wMmY3ZmMyMy1lMWFkLTRkM2MtYmYzNS0xYzNkOTZmNDNkOTIvZDY4dXN1aS1lZjZjMzM0ZS0xMWI3LTRmNzUtODhiOS1lY2QzNGM1ZDRiZjAucG5nIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmZpbGUuZG93bmxvYWQiXX0.3kMXKaqZTAHsDV35EbNLNy4gihS47ZdXmNCv_p0zXAU';

        // ═══════════════════════════════════════════════════════════════
        //  RENDERING OPTIMIZATIONS — funzioni helper riutilizzabili
        // ═══════════════════════════════════════════════════════════════
        
        // Funzione lerp definita fuori dal loop (evita ricreazione ogni frame)
        const lerp = (start, end, t) => start + (end - start) * t;
        
        // Normalizzazione angolo efficiente (no while loops)
        const normalizeAngleDiff = (diff) => {
            diff = ((diff + Math.PI) % (Math.PI * 2)) - Math.PI;
            return diff;
        };
        
        // Funzione unificata per interpolazione entità
        const interpolateEntity = (ent, now) => {
            if (ent.prevX === undefined) {
                ent.prevX = ent.x;
                ent.prevY = ent.y;
                ent.prevAngle = ent.angle;
                ent.targetX = ent.x;
                ent.targetY = ent.y;
                ent.targetAngle = ent.angle;
                ent.renderX = ent.x;
                ent.renderY = ent.y;
                ent.renderAngle = ent.angle;
                ent.lastUpdateTime = now;
                return;
            }
            
            const timeSinceUpdate = now - ent.lastUpdateTime;
            let t = Math.min(timeSinceUpdate / NETWORK_MS, 1);
            t = t * t * (3 - 2 * t);  // Smoothstep
            
            ent.renderX = lerp(ent.prevX, ent.targetX, t);
            ent.renderY = lerp(ent.prevY, ent.targetY, t);
            
            const angleDiff = normalizeAngleDiff(ent.targetAngle - ent.prevAngle);
            ent.renderAngle = ent.prevAngle + angleDiff * t;
        };

        const UPG_DATA = { hp_size: { max: 4, costs: [50, 150, 300, 600] }, damage: { max: 3, costs: [100, 250, 500] }, cannons: { max: 3, costs: [100, 300, 600] }, speed: { max: 3, costs: [80, 200, 400] } };

        document.getElementById('startButton').addEventListener('click', () => {
            document.getElementById('lobbyUI').style.display = 'none';
            canvas.style.display = 'block'; 
            document.getElementById('gameUI').style.display = 'flex';
            document.getElementById('minimapBox').style.display = 'block';
            document.getElementById('leaderboardBox').style.display = 'block';
            document.getElementById('compassBox').style.display = 'flex';
            document.getElementById('chatBox').style.display = 'flex';
            
            if (isMobile) document.getElementById('mobileControls').style.display = 'block';

            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            
            socket.emit('joinGame', {
                username: document.getElementById('usernameInput').value,
                crew: document.getElementById('crewInput').value
            });
        });

        window.buyUpg = function(type) { socket.emit('buyUpgrade', type); }
        window.selectClass = function(c) { socket.emit('selectClass', c); document.getElementById('classSelection').style.display = 'none'; }
        
        socket.on('triggerClassSelection', () => { document.getElementById('classSelection').style.display = 'block'; });

        const chatInput = document.getElementById('chatInput');
        
        // ── Sistema di input basato su stati per fix Spacebar Freeze ──
        let spacePressed = false;
        let lastShootTime = 0;
        const SHOOT_COOLDOWN = 250;  // ms tra spari lato client
        
        window.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter') {
                if (document.activeElement === chatInput) {
                    if (chatInput.value.trim() !== '') socket.emit('chatMessage', chatInput.value);
                    chatInput.value = ''; chatInput.style.display = 'none';
                } else {
                    chatInput.style.display = 'block'; chatInput.focus();
                }
            }
            if (document.activeElement === chatInput) return;

            if (e.code === 'Space' && !e.repeat) {
                spacePressed = true;
            }
            if (e.code === 'KeyQ') socket.emit('useSkill', 'speed');
            if (e.code === 'KeyE') socket.emit('useSkill', 'repair');
            if (e.code === 'KeyR') socket.emit('useSkill', 'smoke');
        });
        
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                spacePressed = false;
            }
        });

        // ── Loop di firing asincrono nel game loop ──
        function handleShooting() {
            if (!spacePressed) return;
            
            const now = Date.now();
            if (now - lastShootTime >= SHOOT_COOLDOWN) {
                socket.emit('shootCommand');
                screenShake = 2;
                lastShootTime = now;
            }
        }

        socket.on('chatMessage', (data) => {
            const container = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-msg msg-${data.type}`;
            const tag = data.crewTag && data.type !== 'system' ? `[${data.crewTag}] ` : "";
            msgDiv.innerText = `${tag}${data.sender}: ${data.text}`;
            container.appendChild(msgDiv);
            if (container.childElementCount > 10) container.removeChild(container.firstChild);
        });

        if (isMobile) {
            document.getElementById('mobBtnShoot').addEventListener('touchstart', () => socket.emit('shootCommand'));
            document.getElementById('mobBtnSkill').addEventListener('touchstart', () => socket.emit('useSkill', 'speed'));
            
            const jZone = document.getElementById('joystickZone');
            const jKnob = document.getElementById('joystickKnob');
            let jActive = false;
            
            jZone.addEventListener('touchstart', (e) => { jActive = true; handleJoystick(e); });
            jZone.addEventListener('touchmove', (e) => { if(jActive) handleJoystick(e); });
            jZone.addEventListener('touchend', () => { jActive = false; jKnob.style.top = '40px'; jKnob.style.left = '40px'; });
            
            function handleJoystick(e) {
                const rect = jZone.getBoundingClientRect();
                const touch = e.touches[0];
                let x = touch.clientX - rect.left - 60; 
                let y = touch.clientY - rect.top - 60;
                const dist = Math.hypot(x, y);
                if (dist > 40) { x = (x/dist)*40; y = (y/dist)*40; }
                jKnob.style.left = `${x + 40}px`; jKnob.style.top = `${y + 40}px`;
                
                const myShip = state.players[socket.id];
                if (myShip) socket.emit('moveCommand', { x: (myShip.renderX || myShip.x) + x*10, y: (myShip.renderY || myShip.y) + y*10 });
            }
        }

        window.addEventListener('click', (e) => {
            if(e.clientY > window.innerHeight - 120 || isMobile || document.activeElement === chatInput) return; 
            if (!state.players[socket.id] || state.players[socket.id].isDead) return;
            const myShip = state.players[socket.id];
            // Usa renderX/renderY (posizione camera interpolata) per la conversione schermo→mondo
            socket.emit('moveCommand', { x: e.clientX - canvas.width/2 + (myShip.renderX || myShip.x), y: e.clientY - canvas.height/2 + (myShip.renderY || myShip.y) });
        });

        socket.on('effect', (data) => {
            if (data.type === 'hit') {
                for(let i=0; i<8; i++) particles.push({ x: data.x, y: data.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 20, color: data.color || '#e74c3c' });
                if (data.targetId === socket.id) screenShake = 6;
            } else if (data.type === 'explosion') {
                for(let i=0; i<30; i++) particles.push({ x: data.x, y: data.y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 40, color: '#f39c12' });
                if (Math.hypot(data.x - state.players[socket.id]?.x, data.y - state.players[socket.id]?.y) < 800) screenShake = 10;
            }
        });

        socket.on('initIslands', (islands) => {
            localIslands = islands;
            drawMinimapBase();
            // MOD 8: Precalcola l'offscreen canvas delle isole UNA SOLA VOLTA
            buildIslandCache();
        });

        // ── MOD 7: Interpolazione client con Lerp basato sul tempo ─────
        // Il server invia aggiornamenti a 20Hz. Per mantenere il movimento
        // fluido a 60 FPS usiamo interpolazione lineare basata sul delta time.
        //
        // Sistema di interpolazione:
        // - targetX/targetY: posizione ricevuta dal server (destinazione)
        // - prevX/prevY: posizione precedente all'ultimo aggiornamento
        // - renderX/renderY: posizione interpolata corrente (usata per rendering)
        // - lastUpdateTime: timestamp dell'ultimo aggiornamento ricevuto
        // - interpolationFactor: fattore calcolato dinamicamente basato sul tempo

        const NETWORK_HZ = 20;  // Server invia a 20Hz
        const NETWORK_MS = 1000 / NETWORK_HZ;  // 50ms tra aggiornamenti

        socket.on('updateState', (newState) => {
            const now = Date.now();

            // Players: array → mappa per id, setup interpolazione
            const newPlayers = {};
            const pArr = newState.players;
            for (let i = 0; i < pArr.length; i++) {
                const p    = pArr[i];
                const prev = state.players[p.id];

                if (prev) {
                    // Salva la posizione corrente render come previous
                    p.prevX = prev.renderX !== undefined ? prev.renderX : prev.x;
                    p.prevY = prev.renderY !== undefined ? prev.renderY : prev.y;
                    p.prevAngle = prev.renderAngle !== undefined ? prev.renderAngle : prev.angle;
                    // La nuova posizione dal server diventa il target
                    p.targetX = p.x;
                    p.targetY = p.y;
                    p.targetAngle = p.angle;
                    // Inizializza render alla previous position
                    p.renderX = p.prevX;
                    p.renderY = p.prevY;
                    p.renderAngle = p.prevAngle;
                } else {
                    // Prima volta: nessuna interpolazione
                    p.prevX = p.x;
                    p.prevY = p.y;
                    p.prevAngle = p.angle;
                    p.targetX = p.x;
                    p.targetY = p.y;
                    p.targetAngle = p.angle;
                    p.renderX = p.x;
                    p.renderY = p.y;
                    p.renderAngle = p.angle;
                }
                p.lastUpdateTime = now;
                newPlayers[p.id] = p;
            }

            // NPCs: array → mappa per id, setup interpolazione
            const newNpcs = {};
            const nArr = newState.npcs;
            for (let i = 0; i < nArr.length; i++) {
                const n    = nArr[i];
                const prev = state.npcs[n.id];

                if (prev) {
                    n.prevX = prev.renderX !== undefined ? prev.renderX : prev.x;
                    n.prevY = prev.renderY !== undefined ? prev.renderY : prev.y;
                    n.prevAngle = prev.renderAngle !== undefined ? prev.renderAngle : prev.angle;
                    n.targetX = n.x;
                    n.targetY = n.y;
                    n.targetAngle = n.angle;
                    n.renderX = n.prevX;
                    n.renderY = n.prevY;
                    n.renderAngle = n.prevAngle;
                } else {
                    n.prevX = n.x;
                    n.prevY = n.y;
                    n.prevAngle = n.angle;
                    n.targetX = n.x;
                    n.targetY = n.y;
                    n.targetAngle = n.angle;
                    n.renderX = n.x;
                    n.renderY = n.y;
                    n.renderAngle = n.angle;
                }
                n.lastUpdateTime = now;
                newNpcs[n.id] = n;
            }

            // Risorse: array diretto (il server le invia già filtrate per VIEW_DISTANCE)
            state = { ...newState, players: newPlayers, npcs: newNpcs };
            
            // Interpolazione Kraken
            if (state.kraken) {
                const prevKraken = state.kraken;
                if (prevKraken.prevX === undefined) {
                    prevKraken.prevX = prevKraken.x;
                    prevKraken.prevY = prevKraken.y;
                    prevKraken.targetX = prevKraken.x;
                    prevKraken.targetY = prevKraken.y;
                    prevKraken.renderX = prevKraken.x;
                    prevKraken.renderY = prevKraken.y;
                    prevKraken.lastUpdateTime = now;
                } else {
                    prevKraken.prevX = prevKraken.renderX;
                    prevKraken.prevY = prevKraken.renderY;
                    prevKraken.targetX = prevKraken.x;
                    prevKraken.targetY = prevKraken.y;
                    prevKraken.renderX = prevKraken.renderX;
                    prevKraken.renderY = prevKraken.renderY;
                    prevKraken.lastUpdateTime = now;
                }
            }
            
            updateUI();
        });

        function updateUI() {
            const p = state.players[socket.id];
            if (!p) return;

            // myData: dati privati inviati solo al destinatario dal server_pro
            const my  = state.myData || {};
            const now = Date.now();

            // Gold (arrotondato per evitare float residui da calcoli server)
            if (my.gold !== undefined)
                document.getElementById('goldAmount').innerText = my.gold | 0;

            // Pulsanti upgrade
            if (my.upg) {
                for (let key in UPG_DATA) {
                    const btn = document.getElementById('btn_' + key);
                    const lvl = my.upg[key];
                    if (lvl >= UPG_DATA[key].max) {
                        btn.innerText = "MAX"; btn.disabled = true;
                    } else {
                        const cost = UPG_DATA[key].costs[lvl];
                        btn.innerText = `LVL ${lvl+1} (${cost}G)`;
                        btn.disabled  = (my.gold | 0) < cost;
                    }
                }
            }

            // Cooldown skill — aggiorna l'icona del pulsante mobile
            // server_pro: speedBoost = { activeUntil, cd }, repair = { cd }, smokeScreen = { activeUntil, cd }
            if (my.skills) {
                const sk      = my.skills;
                const mobSkill = document.getElementById('mobBtnSkill');
                if (mobSkill) {
                    const cdRemaining = Math.max(0, (sk.speedBoost.cd - now) / 1000);
                    mobSkill.textContent = cdRemaining > 0 ? `${cdRemaining.toFixed(0)}s` : '💨';
                    mobSkill.style.opacity = cdRemaining > 0 ? '0.5' : '1';
                }
            }

            // Leaderboard — ricostruita solo se il contenuto è cambiato
            if (state.leaderboard && state.leaderboard.length > 0) {
                let lbHtml = '';
                for (let i = 0; i < state.leaderboard.length; i++) {
                    const entry = state.leaderboard[i];
                    const tag   = entry.crew ? `[${entry.crew}] ` : '';
                    lbHtml += `<div class="lb-entry"><span>${i+1}. ${tag}${entry.name}</span><span>💰${entry.gold}</span></div>`;
                }
                // Aggiorna il DOM solo se diverso → evita reflow inutili
                const lbEl = document.getElementById('leaderboardContent');
                if (lbEl.innerHTML !== lbHtml) lbEl.innerHTML = lbHtml;
            }

            // Bussola
            const angleToCenter = Math.atan2((MAP_SIZE / 2) - p.y, (MAP_SIZE / 2) - p.x);
            document.getElementById('compassNeedle').style.transform = `rotate(${angleToCenter + Math.PI/2}rad)`;
        }

        function drawShip(entity, isNpc = false) {
            const now      = Date.now();
            const mySkills = state.myData && state.myData.skills;

            // renderX/renderY/renderAngle: interpolati nel loop draw() — usa come posizione di rendering
            const rx = entity.renderX !== undefined ? entity.renderX : entity.x;
            const ry = entity.renderY !== undefined ? entity.renderY : entity.y;
            const rAngle = entity.renderAngle !== undefined ? entity.renderAngle : entity.angle;

            ctx.save();
            ctx.translate(rx, ry);
            ctx.rotate(rAngle + Math.PI / 2 + Math.PI);

            // Scia della nave
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.beginPath();
            ctx.moveTo(0, entity.radius);
            ctx.lineTo(-15, entity.radius * 2.5);
            ctx.lineTo(15,  entity.radius * 2.5);
            ctx.fill();

            // Cannoni — cannonCount rappresenta il numero di cannoni per lato (Livello 1:1, Livello 2:2, Livello 3:3)
            ctx.fillStyle = '#111';
            let cannonsPerSide = entity.cannonCount || (entity.type === 'pirate' ? 2 : 1);
            if (entity.shipClass === 'galleon') cannonsPerSide++;
            for (let i = 0; i < cannonsPerSide; i++) {
                const off = (i - (cannonsPerSide - 1) * 0.5) * 15;
                // Porto (sinistra) e Tribordo (destra) - cannoni simmetrici
                ctx.fillRect(-entity.radius - 4, off - 4, 8, 12);
                ctx.fillRect( entity.radius - 4, off - 4, 8, 12);
            }

            // Sprite nave
            const spriteSize = entity.radius * 3.5;

            // Smoke: semi-trasparente per il proprio player
            if (entity.id === socket.id && mySkills?.smokeScreen?.activeUntil > now) {
                ctx.globalAlpha = 0.4;
            }

            // Colore classe — IMPORTANTE: resetta ctx.filter dopo drawImage
            // altrimenti il filter "buca" il ctx.restore() e contamina le entità successive
            if      (entity.shipClass === 'galleon') ctx.filter = 'hue-rotate(90deg)';
            else if (entity.shipClass === 'clipper') ctx.filter = 'hue-rotate(200deg)';

            ctx.drawImage(shipSprite, -spriteSize / 2, -spriteSize / 2, spriteSize, spriteSize);
            ctx.filter = 'none';   // FIX: reset esplicito del filter prima del restore

            ctx.restore();

            // Barra HP (fuori dal save/restore per performance)
            const hpRatio = entity.hp / (entity.maxHp || 150);
            ctx.fillStyle = '#c0392b'; ctx.fillRect(rx - 20, ry - entity.radius - 20, 40, 6);
            ctx.fillStyle = '#2ecc71'; ctx.fillRect(rx - 20, ry - entity.radius - 20, hpRatio * 40, 6);

            // Nome e classe
            ctx.fillStyle   = '#fff';
            ctx.font        = 'bold 12px Arial';
            ctx.textAlign   = 'center';
            const displayTag  = entity.crew ? `[${entity.crew}] ` : '';
            const displayName = isNpc
                ? (entity.type === 'merchant' ? 'Mercantile AI' : 'Pirata NPC')
                : displayTag + entity.name;
            ctx.fillText(displayName, rx, ry - entity.radius - 25);
            if (entity.shipClass) {
                ctx.fillStyle = '#f1c40f';
                ctx.font      = '10px Arial';
                ctx.fillText(`(${entity.shipClass})`, rx, ry - entity.radius - 38);
            }
        }

        // ── MOD 8: Offscreen canvas per le isole ────────────────────
        // Le isole sono statiche: le disegniamo una sola volta su un canvas
        // off-screen e poi usiamo ctx.drawImage() ad ogni frame.
        let islandOffscreen = null;

        function buildIslandCache() {
            if (!localIslands || localIslands.length === 0) return;
            // Crea un canvas grande come la mappa
            islandOffscreen = document.createElement('canvas');
            islandOffscreen.width  = MAP_SIZE;
            islandOffscreen.height = MAP_SIZE;
            const offCtx = islandOffscreen.getContext('2d');

            // Riempi con la texture isola (o colore fallback)
            if (islandTexture.complete && islandTexture.naturalWidth > 0) {
                const pat = offCtx.createPattern(islandTexture, 'repeat');
                if (pat) offCtx.fillStyle = pat;
                else     offCtx.fillStyle = '#e3bc8d';
            } else {
                offCtx.fillStyle = '#e3bc8d';
            }

            offCtx.strokeStyle = '#27ae60';
            offCtx.lineWidth   = 12;

            for (const is of localIslands) {
                offCtx.beginPath();
                for (let i = 0; i < is.points.length; i++) {
                    const pt = is.points[i];
                    const px = is.x + Math.cos(pt.angle) * pt.r;
                    const py = is.y + Math.sin(pt.angle) * pt.r;
                    if (i === 0) offCtx.moveTo(px, py);
                    else         offCtx.lineTo(px, py);
                }
                offCtx.closePath();
                offCtx.fill();
                offCtx.stroke();
            }
        }

        // Ricostruisce la cache dopo che la texture isola è caricata
        islandTexture.onload = () => { if (localIslands.length > 0) buildIslandCache(); };

        let minimapCache = null;
        function drawMinimapBase() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 180; tempCanvas.height = 180;
            const tCtx = tempCanvas.getContext('2d');
            const scale = 180 / MAP_SIZE;
            tCtx.fillStyle = '#f1c40f'; 
            for (let is of localIslands) {
                tCtx.beginPath();
                for (let i = 0; i < is.points.length; i++) {
                    const p = is.points[i];
                    const px = (is.x + Math.cos(p.angle) * p.r) * scale;
                    const py = (is.y + Math.sin(p.angle) * p.r) * scale;
                    if(i===0) tCtx.moveTo(px, py); else tCtx.lineTo(px, py);
                }
                tCtx.fill();
            }
            minimapCache = tempCanvas;
        }

        function drawMinimap() {
            mCtx.clearRect(0,0,180,180);
            if(minimapCache) mCtx.drawImage(minimapCache, 0, 0);
            const scale = 180 / MAP_SIZE;
            
            if (state.kraken) {
                mCtx.fillStyle = '#8e44ad';
                const kx = state.kraken.renderX !== undefined ? state.kraken.renderX : state.kraken.x;
                const ky = state.kraken.renderY !== undefined ? state.kraken.renderY : state.kraken.y;
                mCtx.beginPath(); mCtx.arc(kx * scale, ky * scale, 6, 0, Math.PI*2); mCtx.fill();
            }

            for(let id in state.npcs) {
                const npc = state.npcs[id];
                const nx = npc.renderX !== undefined ? npc.renderX : npc.x;
                const ny = npc.renderY !== undefined ? npc.renderY : npc.y;
                mCtx.fillStyle = npc.type === 'merchant' ? 'orange' : 'purple';
                mCtx.fillRect(nx * scale, ny * scale, 3, 3);
            }
            const myShip = state.players[socket.id];
            for(let id in state.players) {
                if(state.players[id].isDead) continue;
                const p = state.players[id];
                const px = p.renderX !== undefined ? p.renderX : p.x;
                const py = p.renderY !== undefined ? p.renderY : p.y;
                if (id === socket.id) mCtx.fillStyle = '#2ecc71';
                else if (myShip && myShip.crew && myShip.crew === p.crew) mCtx.fillStyle = '#3498db'; 
                else mCtx.fillStyle = '#e74c3c';
                mCtx.beginPath(); mCtx.arc(px * scale, py * scale, id === socket.id ? 4 : 3, 0, Math.PI*2); mCtx.fill();
            }
            if (state.specialTreasure) {
                mCtx.fillStyle = '#f1c40f';
                mCtx.beginPath(); mCtx.arc(state.specialTreasure.x * scale, state.specialTreasure.y * scale, 5, 0, Math.PI*2); mCtx.fill();
            }
        }

        function draw() {
            // Gestione firing asincrono
            handleShooting();
            
            // Sostituzione clear con texture acqua
            const myShip = state.players[socket.id];
            

            if (myShip) {
                // ── MOD 7: Interpolazione lineare basata sul tempo (Lerp) ─
                // Usa funzioni helper riutilizzabili per ridurre overhead
                const now = Date.now();

                // Interpolazione Players (funzione unificata)
                for (const id in state.players) {
                    interpolateEntity(state.players[id], now);
                }

                // Interpolazione NPCs (funzione unificata)
                for (const id in state.npcs) {
                    interpolateEntity(state.npcs[id], now);
                }

                // Interpolazione Kraken
                if (state.kraken && state.kraken.prevX !== undefined) {
                    const kraken = state.kraken;
                    const timeSinceUpdate = now - kraken.lastUpdateTime;
                    let t = Math.min(timeSinceUpdate / NETWORK_MS, 1);
                    t = t * t * (3 - 2 * t);  // Smoothstep
                    
                    kraken.renderX = lerp(kraken.prevX, kraken.targetX, t);
                    kraken.renderY = lerp(kraken.prevY, kraken.targetY, t);
                }

                ctx.save();
                
                let dxShake = 0, dyShake = 0;
                if (screenShake > 0) {
                    dxShake = (Math.random() - 0.5) * screenShake;
                    dyShake = (Math.random() - 0.5) * screenShake;
                    screenShake *= 0.9;
                    if (screenShake < 0.5) screenShake = 0;
                }
                
                // MOD 7: usa renderX/renderY per la camera (movimento fluido)
                ctx.translate(canvas.width / 2 - myShip.renderX + dxShake, canvas.height / 2 - myShip.renderY + dyShake);
                // Acqua — pattern creato una sola volta e riutilizzato (no GC ogni frame)
                if (!_waterPattern && waterTexture.complete && waterTexture.naturalWidth > 0) {
                    _waterPattern = ctx.createPattern(waterTexture, 'repeat');
                }
                ctx.fillStyle = _waterPattern || '#005a82';
                ctx.fillRect(-500, -500, MAP_SIZE + 1000, MAP_SIZE + 1000);
                // ── MOD 8: Isole da offscreen canvas (zero poligoni per frame) ──
                if (islandOffscreen) {
                    ctx.drawImage(islandOffscreen, 0, 0);
                } else {
                    // Fallback: usa colore solido invece di createPattern ogni frame
                    // createPattern è molto costoso e non dovrebbe essere chiamato nel loop
                    ctx.fillStyle = '#e3bc8d';
                    ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 12;
                    for (let is of localIslands) {
                        ctx.beginPath();
                        for (let i = 0; i < is.points.length; i++) {
                            const p = is.points[i];
                            const px = is.x + Math.cos(p.angle) * p.r;
                            const py = is.y + Math.sin(p.angle) * p.r;
                            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                        }
                        ctx.closePath(); ctx.fill(); ctx.stroke();
                    }
                }

                const fov = myShip.shipClass === 'caravel' ? 1400 : 1100;

                // Aggiorna parametri isVisible() — funzione definita fuori da draw()
                _visHalfW = canvas.width  / 2 + 500;
                _visHalfH = canvas.height / 2 + 500;
                _visCx    = myShip.renderX;
                _visCy    = myShip.renderY;

                // ── Risorse: batch rendering per colore (riduce cambiamenti fillStyle) ──
                if (state.resources) {
                    ctx.fillStyle = '#a0522d';  // Colore esterno
                    for (const res of state.resources) {
                        if (!isVisible(res.x, res.y)) continue;
                        ctx.beginPath(); ctx.arc(res.x, res.y, res.radius, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.fillStyle = '#f1c40f';  // Colore interno
                    for (const res of state.resources) {
                        if (!isVisible(res.x, res.y)) continue;
                        ctx.beginPath(); ctx.arc(res.x, res.y, res.radius * 0.4, 0, Math.PI * 2); ctx.fill();
                    }
                }

                // Kraken Rendering
                if (state.kraken) {
                    const kx = state.kraken.renderX !== undefined ? state.kraken.renderX : state.kraken.x;
                    const ky = state.kraken.renderY !== undefined ? state.kraken.renderY : state.kraken.y;
                    if (isVisible(kx, ky)) {  // MOD 6
                        const size = state.kraken.radius * 2.5;
                        if (krakenSprite.complete) {
                            ctx.drawImage(krakenSprite, kx - size/2, ky - size/2, size, size);
                        } else {
                            ctx.fillStyle = '#8e44ad';
                            ctx.beginPath(); ctx.arc(kx, ky, state.kraken.radius, 0, Math.PI*2); ctx.fill();
                        }
                        ctx.fillStyle = '#c0392b'; ctx.fillRect(kx - 50, ky - state.kraken.radius - 20, 100, 8);
                        ctx.fillStyle = '#2ecc71'; ctx.fillRect(kx - 50, ky - state.kraken.radius - 20, (state.kraken.hp / state.kraken.maxHp) * 100, 8);
                    }
                }

                if (state.specialTreasure && isVisible(state.specialTreasure.x, state.specialTreasure.y)) {  // MOD 6
                    const res = state.specialTreasure;
                    ctx.fillStyle = '#d35400'; ctx.fillRect(res.x - res.radius, res.y - res.radius, res.radius*2, res.radius*2);
                    ctx.fillStyle = '#f1c40f';
                    // Cache font e textAlign (impostati solo una volta)
                    if (ctx.font !== 'bold 14px Arial') ctx.font = 'bold 14px Arial';
                    if (ctx.textAlign !== 'center') ctx.textAlign = 'center';
                    ctx.fillText("TESORO", res.x, res.y - res.radius - 8);
                }

                // MOD 6+7: Disegna solo le navi visibili, usando renderX/renderY
                for (let id in state.npcs) {
                    const n = state.npcs[id];
                    if (isVisible(n.renderX, n.renderY)) drawShip(n, true);
                }
                for (let id in state.players) {
                    const p = state.players[id];
                    if (!p.isDead && isVisible(p.renderX, p.renderY)) drawShip(p, false);
                }

                // Particelle — batch rendering per alpha (riduce cambiamenti globalAlpha)
                // Prima raggruppa per alpha, poi disegna
                const particleBatches = {};  // { alpha: [particles] }
                let pi = 0;
                while (pi < particles.length) {
                    const pt = particles[pi];
                    pt.x += pt.vx; pt.y += pt.vy; pt.life--;
                    if (pt.life <= 0) {
                        particles[pi] = particles[particles.length - 1];
                        particles.pop();
                    } else {
                        const alpha = pt.life / 40;
                        if (!particleBatches[alpha]) particleBatches[alpha] = [];
                        particleBatches[alpha].push(pt);
                        pi++;
                    }
                }
                
                // Disegna particelle raggruppate per alpha
                for (const alpha in particleBatches) {
                    const batch = particleBatches[alpha];
                    ctx.globalAlpha = alpha;
                    // Raggruppa anche per colore dentro lo stesso alpha
                    const colorBatches = {};
                    for (const pt of batch) {
                        if (!colorBatches[pt.color]) colorBatches[pt.color] = [];
                        colorBatches[pt.color].push(pt);
                    }
                    for (const color in colorBatches) {
                        ctx.fillStyle = color;
                        for (const pt of colorBatches[color]) {
                            const pr = pt.life / 8;
                            ctx.beginPath(); ctx.arc(pt.x, pt.y, pr < 1 ? 1 : pr, 0, Math.PI * 2); ctx.fill();
                        }
                    }
                }
                ctx.globalAlpha = 1.0;

                // Bullets come fillRect (no beginPath/arc → molto più veloce)
                ctx.fillStyle = '#1a1a1a';
                const bArr = state.bullets;
                for (let bi = 0; bi < bArr.length; bi++) {
                    const b = bArr[bi];
                    if (!isVisible(b.x, b.y)) continue;
                    ctx.fillRect(b.x - 4, b.y - 4, 8, 8);
                }
                ctx.restore();
                
                // Fog gradient cached — non ricreato ogni frame
                ctx.fillStyle = getFogGrad(fov);
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Minimap throttled a ~5Hz (ogni 12 frame)
                _minimapFrame++;
                if (_minimapFrame % 12 === 0) drawMinimap();
            }
            requestAnimationFrame(draw);
        }
        
        shipSprite.onload = () => { draw(); };
        setTimeout(() => { requestAnimationFrame(draw); }, 1000);
        window.addEventListener('resize', () => {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            // Invalida gradient e waterPattern cached al resize
            _fogCache.day = null; _fogCache.night = null;
            _waterPattern  = null;
        });
    </script>
</body>
</html>
