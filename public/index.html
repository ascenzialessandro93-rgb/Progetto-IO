<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Pirate RTS .io</title>
    <style>
        body { margin: 0; overflow: hidden; background: #006994; font-family: 'Arial', sans-serif; user-select: none; }
        canvas { display: block; background: #0077be; }
        
        #lobbyUI { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20,20,20,0.9); padding: 40px; border-radius: 15px; text-align: center; color: white; border: 2px solid #f1c40f; }
        #lobbyUI input { padding: 12px; width: 220px; font-size: 16px; margin-bottom: 15px; }
        #lobbyUI button { padding: 12px 25px; background: #f1c40f; border: none; font-weight: bold; cursor: pointer; }
        
        /* UI DI GIOCO */
        #gameUI { display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.8); border-top: 3px solid #f1c40f; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; box-sizing: border-box; color: white; }
        #stats { font-size: 20px; font-weight: bold; color: #f1c40f; }
        
        /* NEGOZIO */
        #shop { display: flex; gap: 20px; align-items: center; }
        .buy-btn { background: #27ae60; color: white; border: 2px solid #2ecc71; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .buy-btn:hover { background: #2ecc71; transform: scale(1.05); }
        .buy-btn:disabled { background: #555; border-color: #333; color: #888; cursor: not-allowed; transform: none; }
        #shopInfo { font-size: 14px; color: #ccc; }
    </style>
</head>
<body>

    <div id="lobbyUI">
        <h1 style="color:#f1c40f;">IMPERO PIRATA .IO</h1>
        <input type="text" id="usernameInput" placeholder="Nome Capitano..."><br>
        <button id="startButton">ENTRA IN GIOCO</button>
    </div>

    <canvas id="gameCanvas" style="display:none;"></canvas>

    <div id="gameUI" style="display:none;">
        <div id="stats">💰 Oro: <span id="goldAmount">0</span></div>
        <div id="shop">
            <div id="shopInfo">Raccogli oro dai mercantili per sbloccare il prossimo Tier!</div>
            <button id="buyUpgradeBtn" class="buy-btn" disabled>Upgrade Tier 1 (50 Oro)<br><small>+HP, +Dimensione, +Cannoni</small></button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameUI = document.getElementById('gameUI');
        
        let state = { players: {}, npcs: {}, bullets: [] };
        let localIslands = [];

        // Costi locali per la UI
        const SHOP_COSTS = { 0: 50, 1: 150, 2: 300 };

        document.getElementById('startButton').addEventListener('click', () => {
            document.getElementById('lobbyUI').style.display = 'none';
            canvas.style.display = 'block';
            gameUI.style.display = 'flex';
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            socket.emit('joinGame', document.getElementById('usernameInput').value);
        });

        document.getElementById('buyUpgradeBtn').addEventListener('click', () => {
            socket.emit('buyUpgrade');
        });

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') socket.emit('shootCommand'); });
        window.addEventListener('click', (e) => {
            if(e.clientY > window.innerHeight - 80) return; // Non muovere se clicchi sul negozio
            if (!state.players[socket.id] || state.players[socket.id].isDead) return;
            const myShip = state.players[socket.id];
            socket.emit('moveCommand', { x: e.clientX - canvas.width/2 + myShip.x, y: e.clientY - canvas.height/2 + myShip.y });
        });

        socket.on('initIslands', (islands) => { localIslands = islands; });
        socket.on('updateState', (newState) => { state = newState; updateUI(); });

        function updateUI() {
            const p = state.players[socket.id];
            if (!p) return;
            
            // Aggiorna contatore Oro
            document.getElementById('goldAmount').innerText = p.gold;

            // Aggiorna Bottone Negozio
            const btn = document.getElementById('buyUpgradeBtn');
            if (p.tier >= 3) {
                btn.innerText = "Nave Massimizzata!";
                btn.disabled = true;
            } else {
                const cost = SHOP_COSTS[p.tier];
                btn.innerHTML = `Sblocca Tier ${p.tier + 1} (${cost} Oro)<br><small>+HP, +Massa, +Cannoni</small>`;
                btn.disabled = p.gold < cost;
            }
        }

        // Funzione per disegnare le navi e i loro cannoni
        function drawShip(entity, isNpc = false) {
            ctx.save();
            ctx.translate(entity.x, entity.y);
            ctx.rotate(entity.angle);

            // Disegna Cannoni (Quadratini neri)
            ctx.fillStyle = '#111';
            const cannonsPerSide = entity.cannonCount ? entity.cannonCount / 2 : (entity.type === 'pirate' ? 2 : 0);
            
            for(let i=0; i<cannonsPerSide; i++) {
                const offset = (i - (cannonsPerSide-1)/2) * 15;
                // Cannone Sinistro (Sopra l'asse Y navale)
                ctx.fillRect(offset - 4, -entity.radius - 4, 8, 8);
                // Cannone Destro (Sotto l'asse Y navale)
                ctx.fillRect(offset - 4, entity.radius - 4, 8, 8);
            }

            // Scafo
            ctx.fillStyle = isNpc ? (entity.type === 'merchant' ? '#d35400' : '#c0392b') : entity.color;
            ctx.beginPath();
            ctx.moveTo(-entity.radius, -entity.radius * 0.7);
            ctx.lineTo(entity.radius * 1.3, 0);
            ctx.lineTo(-entity.radius, entity.radius * 0.7);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.restore();

            // HP Bar
            ctx.fillStyle = '#c0392b'; ctx.fillRect(entity.x - 20, entity.y - entity.radius - 15, 40, 5);
            ctx.fillStyle = '#2ecc71'; 
            const maxHp = entity.maxHp || (entity.type === 'merchant' ? 200 : 150);
            ctx.fillRect(entity.x - 20, entity.y - entity.radius - 15, (entity.hp / maxHp) * 40, 5);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const myShip = state.players[socket.id];

            if (myShip) {
                ctx.save();
                ctx.translate(canvas.width / 2 - myShip.x, canvas.height / 2 - myShip.y);

                // Disegna Isole
                ctx.fillStyle = '#e3bc8d'; ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 4;
                for (let island of localIslands) {
                    for (let circle of island.circles) {
                        ctx.beginPath(); ctx.arc(circle.x, circle.y, circle.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    }
                }

                // Disegna NPC
                for (let id in state.npcs) drawShip(state.npcs[id], true);

                // Disegna Giocatori
                for (let id in state.players) {
                    if (!state.players[id].isDead) drawShip(state.players[id], false);
                }

                // Disegna Proiettili
                ctx.fillStyle = '#2c3e50';
                for (let b of state.bullets) {
                    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
                }

                ctx.restore();
            }
            requestAnimationFrame(draw);
        }
        draw();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
