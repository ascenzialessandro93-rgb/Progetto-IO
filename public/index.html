<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Pirate RTS .io</title>
    <style>
        body { margin: 0; overflow: hidden; background: #006994; font-family: 'Arial', sans-serif; }
        canvas { display: block; background: #0077be; }
        #lobbyUI {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.9); padding: 40px; border-radius: 15px;
            text-align: center; color: white; box-shadow: 0 0 25px rgba(0,0,0,0.7); border: 2px solid #e67e22;
        }
        #lobbyUI input { padding: 12px; width: 220px; border: none; border-radius: 5px; margin-bottom: 20px; font-size: 16px; }
        #lobbyUI button { padding: 12px 25px; background: #e67e22; border: none; border-radius: 5px; color: white; font-size: 18px; cursor: pointer; font-weight: bold; }
        #lobbyUI button:hover { background: #d35400; }
        #controlsHelp { color: #aaa; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="lobbyUI">
        <h1 style="color:#e67e22; margin-top:0;">BATTAGLIA NAVALE .IO</h1>
        <input type="text" id="usernameInput" placeholder="Nome Capitano..." maxlength="12"><br>
        <button id="startButton">PRENDI IL TIMONE</button>
        <div id="controlsHelp">Click Sinistro: Muovi Flotta | Barra Spaziatrice: Fuoco Laterale</div>
    </div>

    <canvas id="gameCanvas" style="display:none;"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const lobbyUI = document.getElementById('lobbyUI');
        const startButton = document.getElementById('startButton');

        let localPlayers = {};
        let localBullets = [];
        let localIslands = [];

        startButton.addEventListener('click', () => {
            const name = document.getElementById('usernameInput').value;
            lobbyUI.style.display = 'none';
            canvas.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            socket.emit('joinGame', name);
        });

        // Tasto Spazio per sparare con i cannoni di babordo e tribordo
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                socket.emit('shootCommand');
            }
        });

        window.addEventListener('click', (e) => {
            if (!localPlayers[socket.id] || localPlayers[socket.id].isDead) return;
            const myShip = localPlayers[socket.id];
            const worldX = e.clientX - canvas.width / 2 + myShip.x;
            const worldY = e.clientY - canvas.height / 2 + myShip.y;
            socket.emit('moveCommand', { x: worldX, y: worldY });
        });

        socket.on('initIslands', (islands) => { localIslands = islands; });
        socket.on('updateState', (state) => {
            localPlayers = state.players;
            localBullets = state.bullets;
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (localPlayers[socket.id]) {
                const myShip = localPlayers[socket.id];
                
                ctx.save();
                ctx.translate(canvas.width / 2 - myShip.x, canvas.height / 2 - myShip.y);

                // Confini mappa
                ctx.strokeStyle = "rgba(231, 76, 60, 0.4)";
                ctx.lineWidth = 8;
                ctx.strokeRect(0, 0, 3000, 3000);

                // Disegna Isole Irregolari composte
                ctx.fillStyle = '#e3bc8d'; 
                ctx.strokeStyle = '#27ae60';
                ctx.lineWidth = 5;
                for (let island of localIslands) {
                    for (let circle of island.circles) {
                        ctx.beginPath();
                        ctx.arc(circle.x, circle.y, circle.radius, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                    }
                }

                // Disegna Proiettili Palle di Cannone
                ctx.fillStyle = '#2c3e50';
                for (let b of localBullets) {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Disegna Navi Giocatori
                for (let id in localPlayers) {
                    const player = localPlayers[id];
                    if (player.isDead) continue;

                    ctx.save();
                    ctx.translate(player.x, player.y);
                    ctx.rotate(player.angle); // Ruota il disegno verso la direzione di marcia

                    // Disegno scafo a forma di barchetta/punta
                    ctx.fillStyle = player.color;
                    ctx.beginPath();
                    ctx.moveTo(-player.radius, -player.radius * 0.7);
                    ctx.lineTo(player.radius * 1.3, 0); // Prua a punta verso destra
                    ctx.lineTo(-player.radius, player.radius * 0.7);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Riga nera di mezzeria (ponte della nave)
                    ctx.strokeStyle = '#111';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.restore();

                    // --- INTERFACCIA SOPRA LA NAVE (HP e Nome) ---
                    // Nome
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 13px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(player.name, player.x, player.y - player.radius - 20);

                    // Sfondo Barra HP (Rosso)
                    ctx.fillStyle = '#c0392b';
                    ctx.fillRect(player.x - 25, player.y - player.radius - 12, 50, 6);
                    // Barra HP Attuale (Verde)
                    ctx.fillStyle = '#2ecc71';
                    const hpWidth = (player.hp / player.maxHp) * 50;
                    ctx.fillRect(player.x - 25, player.y - player.radius - 12, hpWidth, 6);
                }

                ctx.restore();
            } else if (canvas.style.display === 'block') {
                // Schermata di Affondamento Temporanea
                ctx.fillStyle = 'white';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText("La tua flotta è colata a picco! Respawn in corso...", canvas.width/2, canvas.height/2);
            }

            requestAnimationFrame(draw);
        }
        draw();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
